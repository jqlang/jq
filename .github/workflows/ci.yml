name: CI

on:
  push:
    branches: [master]
    tags: ["jq-*"]
  pull_request:

jobs:

  build:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:

          # ---------- Linux ----------
          - arch: linux-amd64
            host: x86_64-linux-gnu
            cc: gcc

          - arch: linux-arm64
            host: aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc

          - arch: linux-i386
            host: i686-linux-gnu
            cc: i686-linux-gnu-gcc

          # ---------- Windows (LLVM MinGW) ----------
          - arch: win-amd64
            host: x86_64-w64-mingw32

          - arch: win-i386
            host: i686-w64-mingw32

          - arch: win-arm64
            host: aarch64-w64-mingw32

    steps:

      - uses: actions/checkout@v4
        with:
          submodules: true

      # ---------- Dependencies ----------
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool make \
            gcc g++ \
            gcc-aarch64-linux-gnu \
            gcc-i686-linux-gnu \
            clang lld curl xz-utils

      # ---------- LLVM MinGW ----------
      - name: Install LLVM MinGW
        if: startsWith(matrix.arch, 'win-')
        run: |
          set -e

          URL="https://github.com/mstorsjo/llvm-mingw/releases/download/20260407/llvm-mingw-20260407-msvcrt-ubuntu-22.04-x86_64.tar.xz"

          echo "Downloading LLVM MinGW..."
          curl -fL "$URL" -o llvm-mingw.tar.xz

          file llvm-mingw.tar.xz
          tar -xf llvm-mingw.tar.xz

          LLVM_DIR=$(find . -maxdepth 1 -type d -name "llvm-mingw-*")
          echo "LLVM DIR: $LLVM_DIR"

          echo "$PWD/$LLVM_DIR/bin" >> $GITHUB_PATH

      # ---------- Build ----------
      - name: Build
        run: |
          set -e

          autoreconf -i

          ARCH="${{ matrix.arch }}"
          HOST="${{ matrix.host }}"
          CC="${{ matrix.cc }}"

          if [[ "$ARCH" == win-* ]]; then
            TARGET="$HOST"

            export CC="clang --target=$TARGET"
            export CXX="clang++ --target=$TARGET"
            export AR="llvm-ar"
            export RANLIB="llvm-ranlib"
            export LDFLAGS="-fuse-ld=lld"

            OUT="jq-windows-${ARCH#win-}.exe"
          else
            export CC="$CC"
            OUT="jq-${ARCH}"
          fi

          echo "ARCH=$ARCH"
          echo "HOST=$HOST"
          echo "CC=$CC"

          ./configure \
            --host="$HOST" \
            --disable-docs \
            --with-oniguruma=builtin \
            --enable-static \
            CFLAGS="-O2"

          make -j"$(nproc)"

          if [[ "$ARCH" == win-* ]]; then
            cp jq.exe "$OUT"
          else
            cp jq "$OUT"
          fi

      # ---------- Test ----------
      - name: Test (Linux only)
        if: matrix.arch == 'linux-amd64'
        run: make check

      # ---------- Artifacts ----------
      - uses: actions/upload-artifact@v4
        with:
          name: jq-${{ matrix.arch }}
          path: jq-*
          if-no-files-found: error


  # ==================================================
  # macOS
  # ==================================================
  macos:
    runs-on: macos-14

    strategy:
      matrix:
        include:
          - arch: macos-amd64
            target: x86_64-apple-darwin

          - arch: macos-arm64
            target: arm64-apple-darwin

    steps:

      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: |
          brew update || true
          brew install autoconf automake libtool

      - name: Build
        run: |
          set -e

          autoreconf -i

          export CC="clang -target ${{ matrix.target }}"
          export CFLAGS="-O2"

          ./configure \
            --host="${{ matrix.target }}" \
            --disable-docs \
            --with-oniguruma=builtin \
            --enable-static

          make -j"$(sysctl -n hw.logicalcpu)"

          strip jq
          cp jq "jq-${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: jq-${{ matrix.arch }}
          path: jq-*


  # ==================================================
  # Release
  # ==================================================
  release:
    runs-on: ubuntu-latest
    needs: [build, macos]
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
      pull-requests: write
    environment: release
    needs: [linux, macos, windows, dist, docker]
    if: startsWith(github.ref, 'refs/tags/jq-')

    steps:

      - uses: actions/download-artifact@v4
        with:
          pattern: jq-*
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF##*/}"

          sha256sum jq-* > sha256sum.txt

          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            jq-* sha256sum.txt

name: CI
on:
  push:
    branches:
      - master
    tags:
      - "jq-*"
  pull_request:

jobs:
  linux:
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
          - i386
          - ppc64el
          - riscv64
          - s390x
        include:
          # TODO: arm/v7 arm/v6?
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
          - arch: i386
            platform: linux/386
          - arch: ppc64el
            platform: linux/ppc64le
          - arch: riscv64
            platform: linux/riscv64
          - arch: s390x
            platform: linux/s390x
    runs-on: ubuntu-24.04
    env:
      BIN_NAME: jq-linux-${{ matrix.arch }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v5
        with:
          submodules: true
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build
        run: |
          docker build --platform ${{ matrix.platform }} -t jq-build-${{ env.BIN_NAME }} .
          docker cp $(docker create jq-build-${{ env.BIN_NAME }}):/jq ${{ env.BIN_NAME }}
          file ${{ env.BIN_NAME }}
      - name: Upload Test Logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v5
        with:
          name: test-logs-${{ env.BIN_NAME }}
          retention-days: 7
          path: |
            test-suite.log
            tests/*.log
      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.BIN_NAME }}
          path: ${{ env.BIN_NAME }}
          if-no-files-found: error
          retention-days: 7

  macos:
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
        include:
          - arch: amd64
            runs_on: macos-15-intel
          - arch: arm64
            runs_on: macos-15
    runs-on: ${{ matrix.runs_on }}
    env:
      LDFLAGS: -dead_strip
      SUFFIX: macos-${{ matrix.arch }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v5
        with:
          submodules: true
      - name: Install packages
        run: |
          # brew update sometimes fails with "Fetching /usr/local/Homebrew/Library/Taps/homebrew/homebrew-cask failed!"
          brew update || brew update-reset
          brew install autoconf automake libtool pcre2
      - name: Build
        run: |
          autoreconf -i
          ./configure \
            --disable-docs \
            --with-oniguruma=no \
            --with-pcre2 \
            --disable-shared \
            --enable-static \
            --enable-all-static \
            CFLAGS="-O2 -pthread -fstack-protector-all"
          make -j"$(sysctl -n hw.logicalcpu)"
          strip ./jq
          file ./jq
          cp ./jq jq-${{ env.SUFFIX }}
      - name: Test
        run: |
          make check VERBOSE=yes
          git diff --exit-code
      - name: Upload Test Logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v5
        with:
          name: test-logs-${{ env.SUFFIX }}
          retention-days: 7
          path: |
            test-suite.log
            tests/*.log
      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: jq-${{ env.SUFFIX }}
          path: jq-${{ env.SUFFIX }}
          if-no-files-found: error
          retention-days: 7

  windows:
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - i386
          - arm64
        include:
          - arch: amd64
            msystem: UCRT64
            os: windows-2022
          - arch: i386
            msystem: MINGW32
            os: windows-2022
          - arch: arm64
            msystem: CLANGARM64
            os: windows-11-arm
    runs-on: ${{ matrix.os }}
    env:
      LDFLAGS: -s
      SUFFIX: windows-${{ matrix.arch }}
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Prepare git config
        run: git config --system core.autocrlf false
        shell: bash
      - name: Clone repository
        uses: actions/checkout@v5
        with:
          submodules: true
      - uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: ${{ matrix.msystem }}
          install: >-
            base-devel
            git
            autoconf
            automake
            libtool
          pacboy: >-
            toolchain:p
            pcre2:p
      - name: Build
        run: |
          autoreconf -i
          ./configure \
            --disable-docs \
            --with-oniguruma=no \
            --with-pcre2 \
            --disable-shared \
            --enable-static \
            --enable-all-static \
            CFLAGS="-O2 -pthread -fstack-protector-all -Wl,--stack,8388608"
          make -j$(nproc)
          file ./jq.exe
          cp ./jq.exe jq-${{ env.SUFFIX }}.exe
      - name: Test
        run: |
          make check VERBOSE=yes
          git diff --exit-code
      - name: Upload Test Logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v5
        with:
          name: test-logs-${{ env.SUFFIX }}
          retention-days: 7
          path: |
            test-suite.log
            tests/*.log
      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: jq-${{ env.SUFFIX }}
          path: jq-${{ env.SUFFIX }}.exe
          if-no-files-found: error
          retention-days: 7

  dist:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v5
        with:
          submodules: true
      - name: Install packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y automake autoconf libpcre2-dev libpcre2-8-0
      - name: Create dist
        run: |
          autoreconf -i
          ./configure \
            --disable-docs \
            --with-oniguruma=builtin
          make distcheck
          make dist dist-zip
          git diff --exit-code
      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: jq-dist
          if-no-files-found: error
          retention-days: 7
          path: |
            jq-*.tar.gz
            jq-*.zip

  docker:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      attestations: write
      packages: write
    needs: linux
    steps:
      - name: Clone repository
        uses: actions/checkout@v5
      - name: Download executables
        uses: actions/download-artifact@v6
        with:
          pattern: jq-linux-*
          merge-multiple: true
      - name: Move executables
        run: |
          mkdir -p linux/{386,amd64,arm64,ppc64le,riscv64,s390x}
          mv jq-linux-i386 linux/386/jq
          mv jq-linux-amd64 linux/amd64/jq
          mv jq-linux-arm64 linux/arm64/jq
          mv jq-linux-ppc64el linux/ppc64le/jq
          mv jq-linux-riscv64 linux/riscv64/jq
          mv jq-linux-s390x linux/s390x/jq
          chmod +x linux/*/jq
      - name: Create Dockerfile
        run: |
          cat <<'EOF' >Dockerfile
          FROM scratch
          ARG TARGETPLATFORM
          COPY AUTHORS COPYING $TARGETPLATFORM/jq /
          RUN ["/jq", "--version"]
          ENTRYPOINT ["/jq"]
          EOF
      - name: Docker metadata
        uses: docker/metadata-action@v5
        id: metadata
        with:
          images: ghcr.io/${{ github.repository }}
          tags: >
            ${{ startsWith(github.ref, 'refs/tags/jq-')
            && format('type=match,pattern=jq-(.*),group=1,value={0}', github.ref_name)
            || 'type=sha,format=long' }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and release Docker image
        uses: docker/build-push-action@v6
        id: build-push
        with:
          context: .
          push: ${{ startsWith(github.ref, 'refs/tags/jq-') }}
          provenance: false
          platforms: linux/386,linux/amd64,linux/arm64,linux/ppc64le,linux/riscv64,linux/s390x
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
      - name: Generate signed attestations
        if: startsWith(github.ref, 'refs/tags/jq-')
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      pull-requests: write
    environment: release
    needs: [linux, macos, windows, dist, docker]
    if: startsWith(github.ref, 'refs/tags/jq-')
    steps:
      - name: Clone repository
        uses: actions/checkout@v5
      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: jq-*
          merge-multiple: true
      - name: Upload release
        env:
          TAG_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp jq-linux-amd64 jq-linux64
          cp jq-macos-amd64 jq-osx-amd64
          cp jq-windows-amd64.exe jq-win64.exe
          sha256sum jq-* > sha256sum.txt
          gh release create "$TAG_NAME" --draft --title "jq ${TAG_NAME#jq-}" --generate-notes
          gh release upload "$TAG_NAME" --clobber jq-* sha256sum.txt
      - name: Generate signed attestations
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: jq-*
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.JQ_RELEASE_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.JQ_RELEASE_GPG_PASSPHRASE }}
      - name: Update signatures
        env:
          TAG_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sig_dir="sig/v${TAG_NAME#jq-}"
          mkdir -p "$sig_dir"
          mv sha256sum.txt "$sig_dir"
          for file in jq-*; do
            gpg --detach-sign --armor --batch --output "${sig_dir}/${file#*/}.asc" "$file"
          done
          git add sig
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          title="Update signatures of ${TAG_NAME#jq-}"
          git commit -m "$title"
          branch="update-signatures-${TAG_NAME#jq-}"
          git push origin "HEAD:refs/heads/$branch"
          gh pr create --title "$title" --body "" --head "$branch"

name: oniguruma
on:
  push:
    branches:
      - master
  pull_request:

# Since builtin oniguruma is tested in the CI workflow,
# we test other options for --with-oniguruma here.
jobs:
  installed:
    runs-on: ubuntu-24.04
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y meson valgrind libonig-dev
      - name: Build
        run: |
          meson setup _build -Ddocs=false -Dvalgrind=true -Doniguruma=system
          ninja -C _build
          file _build/src/jq
      - name: Test
        run: |
          cd _build
          ./src/jq -n '"" | test("")'
          meson test -v
          git diff --exit-code
      - name: Upload Test Logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-logs-oniguruma-installed
          retention-days: 7
          path: |
            _build/meson-logs/testlog.txt

  disabled:
    runs-on: ubuntu-24.04
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y meson
      - name: Build
        run: |
          meson setup _build -Ddocs=false -Dvalgrind=true -Doniguruma=false
          ninja -C _build
          file _build/src/jq
      - name: Test
        run: |
          cd _build
          ! ./src/jq -n '"" | test("")'
          meson test -v
          git diff --exit-code
      - name: Upload Test Logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-logs-oniguruma-disabled
          retention-days: 7
          path: |
            _build/meson-logs/testlog.txt

name: Building man page, man.test, manonig.test
on:
  push:
    paths:
      - '.github/workflows/manpage.yml'
      - 'docs/**'
      - 'tests/man.test'
      - 'tests/manonig.test'
      - 'jq.1.prebuilt'
  pull_request:
    paths:
      - '.github/workflows/manpage.yml'
      - 'docs/**'
      - 'tests/man.test'
      - 'tests/manonig.test'
      - 'jq.1.prebuilt'

jobs:
  manpages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y meson
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pipenv
      - name: Install pipenv
        run: pip install pipenv
      - name: Install dependencies
        run: pipenv sync
        working-directory: docs
      - name: Validate manual schema
        run: pipenv run python3 validate_manual_schema.py content/manual/**/*.yml
        working-directory: docs
      - name: Configure
        run: |
          meson setup _build -Doniguruma=false
      - name: Build man page, man.test, manonig.test
        run: |
          ninja -C _build docs/jq.1 build_mantests
      - name: Make sure that jq.1.prebuilt, man.test, manonig.test are up to date
        run: |
          git diff --exit-code tests/man.test tests/manonig.test
          # skip build date in jq.1.prebuilt
          test -s jq.1.prebuilt
          diff -- <(tail -n +3 jq.1.prebuilt) <(tail -n +3 _build/docs/jq.1)

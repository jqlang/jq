name: Clang scan-build Static Analyzer Build

on:
  push:
    branches:
      - master

jobs:
  scan-build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Install packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y meson valgrind clang clang-tools
          echo "CC=clang" >> "$GITHUB_ENV"
      - name: Build
        run: |
          meson setup -Dvalgrind=true -Dbuildtype=debug
          scan-build --keep-going --exclude vendor/ ninja -C _build
      - name: Test
        run: |
          ulimit -c unlimited
          scan-build --keep-going --exclude vendor/ ninja -C _build test
      - name: Core dump stacks
        run: |
          if [[ -f core ]]; then
            gdb -batch -ex "thread apply all bt" \
              "$(file core | sed "s/^[^']*'//; s/[ '].*$//")" core
            exit 1
          fi
      - name: Test logs
        if: ${{ failure() }}
        run: |
          cat _build/meson-logs/testlog.txt
      - name: Upload Logs
        uses: actions/upload-artifact@v7
        with:
          name: Scan-Build Reports
          path: /tmp/scan-build*
          if-no-files-found: ignore
          retention-days: 7

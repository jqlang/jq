name: valgrind
on:
  push:
    branches:
      - master
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y meson valgrind
      - name: Build
        run: |
          meson setup _build -Ddocs=false -Dvalgrind=true -Doniguruma=builtin
          ninja -C _build
          file _build/src/jq
      - name: Test
        run: |
          cd _build
          meson test -v
          git diff --exit-code
      - name: Upload Test Logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-logs-valgrind-linux
          retention-days: 7
          path: |
            _build/meson-logs/testlog.txt
